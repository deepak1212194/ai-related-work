services:
  resume-enhancer:
    build: .
    image: resume-enhancer:5.0
    container_name: resume-enhancer
    ports:
      - "7860:7860"
    environment:
      RESUME_LLM_BACKEND: ${RESUME_LLM_BACKEND:-auto}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      HF_API_KEY: ${HF_API_KEY:-}
      HF_MODEL: ${HF_MODEL:-meta-llama/Llama-3.1-8B-Instruct}
      RESUME_MAX_ITERATIONS: ${RESUME_MAX_ITERATIONS:-3}
      RESUME_ACCEPT_THRESHOLD: ${RESUME_ACCEPT_THRESHOLD:-82}
      RESUME_LOG_LEVEL: ${RESUME_LOG_LEVEL:-INFO}
      RESUME_MAX_UPLOAD_KB: ${RESUME_MAX_UPLOAD_KB:-512}
      RESUME_MAX_RUNS_PER_HOUR: ${RESUME_MAX_RUNS_PER_HOUR:-5}
      RESUME_WORK_TTL_HOURS: ${RESUME_WORK_TTL_HOURS:-24}
      RESUME_LLM_MAX_RETRIES: ${RESUME_LLM_MAX_RETRIES:-3}
      RESUME_LLM_TIMEOUT_S: ${RESUME_LLM_TIMEOUT_S:-90}
      RESUME_AUTH_USER: ${RESUME_AUTH_USER:-}
      RESUME_AUTH_PASS: ${RESUME_AUTH_PASS:-}
    volumes:
      # Mount skills/ and data/jds/ for live editing without a rebuild
      - ./skills:/app/skills:ro
      - ./data/jds:/app/data/jds:ro
    restart: unless-stopped
