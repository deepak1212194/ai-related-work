<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edge Person Tracker · Live</title>
  <style>
    :root {
      --bg: #0d1117; --bg-elev: #161b22; --bg-soft: #1f2530;
      --text: #e6edf3; --muted: #8b949e; --accent: #6ea8fe;
      --accent-soft: rgba(110,168,254,.16); --border: #30363d;
      --ok: #34d399; --warn: #fbbf24;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #fafbff; --bg-elev: #fff; --bg-soft: #f0f3fa;
        --text: #1a1d29; --muted: #6b7280; --accent: #4f8cff;
        --accent-soft: rgba(79,140,255,.12); --border: #e3e6ee;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
    }
    .wrap { max-width: 1080px; margin: 0 auto; }
    h1 { font-size: 1.4rem; margin: 0 0 4px; }
    .sub { color: var(--muted); margin: 0 0 22px; }
    .panel {
      background: var(--bg-elev); border: 1px solid var(--border);
      border-radius: 14px; padding: 22px; margin-bottom: 18px;
    }
    h3 { margin: 0 0 12px; font-size: .82rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    button {
      padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-weight: 500;
      font-size: .92rem; cursor: pointer;
    }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .drop {
      border: 2px dashed var(--border); border-radius: 12px;
      padding: 28px; text-align: center; color: var(--muted); cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .drop.over { border-color: var(--accent); background: var(--accent-soft); color: var(--text); }
    .drop input { display: none; }

    /* video + canvas overlay */
    .stage {
      position: relative; width: 100%; aspect-ratio: 16 / 9;
      background: #000; border-radius: 12px; overflow: hidden;
    }
    .stage video, .stage canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
    }
    .stage canvas { pointer-events: none; }

    .stats { display: flex; gap: 18px; margin-top: 12px; color: var(--muted); font-size: .86rem; }
    .stats strong { color: var(--text); }

    .pill {
      display: inline-block; padding: 4px 10px; border-radius: 999px;
      background: var(--bg-soft); color: var(--text); font-size: .78rem;
      border: 1px solid var(--border);
    }
    .pill.ok { color: var(--ok); border-color: var(--ok); }
    .pill.warn { color: var(--warn); border-color: var(--warn); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>👥 Edge Person Tracker</h1>
    <p class="sub">Upload a video → run YOLO + IoU tracking → watch IDs follow people in real time.</p>

    <div class="panel">
      <h3>1 · Upload video</h3>
      <label class="drop" id="drop">
        <input type="file" id="file" accept="video/mp4,video/quicktime,video/x-msvideo" />
        <div><strong>Drop a video</strong> or click to choose · MP4 / MOV / AVI · max 200 MB</div>
      </label>
      <div class="row" style="margin-top: 12px;">
        <button class="primary" id="trackBtn" disabled>▶ Start tracking</button>
        <span id="trackStatus" class="pill">no video</span>
      </div>
    </div>

    <div class="panel">
      <h3>2 · Live tracking</h3>
      <div class="stage" id="stage">
        <video id="video" controls preload="metadata" muted></video>
        <canvas id="canvas"></canvas>
      </div>
      <div class="stats">
        <div>Frame <strong id="frameNo">—</strong></div>
        <div>Active tracks <strong id="liveTracks">—</strong></div>
        <div>Unique IDs seen <strong id="uniqueIds">—</strong></div>
      </div>
    </div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
const drop = $("drop"), fileInput = $("file"), video = $("video"), canvas = $("canvas");
const ctx = canvas.getContext("2d");

let videoId = null;
let intrinsicW = 0, intrinsicH = 0;
const seenIds = new Set();

// ──────────────── Drag-drop upload ────────────────
["dragenter","dragover"].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.add("over"); }));
["dragleave","drop"].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.remove("over"); }));
drop.addEventListener("drop", ev => upload(ev.dataTransfer.files[0]));
fileInput.addEventListener("change", ev => upload(ev.target.files[0]));
drop.addEventListener("click", () => fileInput.click());

async function upload(f) {
  if (!f) return;
  $("trackStatus").textContent = "uploading…";
  $("trackStatus").className = "pill";
  const fd = new FormData();
  fd.append("file", f);
  try {
    const r = await fetch("/api/upload", { method: "POST", body: fd }).then(x => x.json());
    if (!r.video_id) throw new Error("upload failed");
    videoId = r.video_id;
    video.src = `/videos/${r.filename}`;
    $("trackBtn").disabled = false;
    $("trackStatus").textContent = `ready · ${r.filename}`;
    $("trackStatus").classList.add("ok");
  } catch (e) {
    $("trackStatus").textContent = "error";
    $("trackStatus").classList.add("warn");
  }
}

// ──────────────── Resize canvas to match video ────────────────
function syncCanvas() {
  intrinsicW = video.videoWidth; intrinsicH = video.videoHeight;
  if (intrinsicW && intrinsicH) {
    canvas.width = intrinsicW; canvas.height = intrinsicH;
  }
}
video.addEventListener("loadedmetadata", syncCanvas);
window.addEventListener("resize", syncCanvas);

// ──────────────── Tracking via WebSocket ────────────────
const PALETTE = ["#6ea8fe","#34d399","#fb923c","#a78bfa","#f472b6","#22d3ee","#facc15","#f87171"];
let latestUpdate = null;

$("trackBtn").onclick = () => {
  if (!videoId) return;
  $("trackBtn").disabled = true;
  seenIds.clear();
  $("trackStatus").textContent = "connecting…";

  const proto = location.protocol === "https:" ? "wss" : "ws";
  const ws = new WebSocket(`${proto}://${location.host}/api/track/stream`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ video_id: videoId }));
    $("trackStatus").textContent = "tracking…";
    video.currentTime = 0;
    video.play();
    requestAnimationFrame(drawLoop);
  };
  ws.onmessage = (ev) => {
    const data = JSON.parse(ev.data);
    if (data.event === "start") return;
    if (data.event === "done") {
      ws.close();
      $("trackStatus").textContent = `complete · ${data.frames} frames`;
      $("trackStatus").classList.add("ok");
      $("trackBtn").disabled = false;
      return;
    }
    if (data.event === "error") {
      $("trackStatus").textContent = `error: ${data.detail}`;
      ws.close(); return;
    }
    latestUpdate = data;
    data.tracks?.forEach(t => seenIds.add(t.track_id));
    $("frameNo").textContent = data.frame;
    $("liveTracks").textContent = data.n_tracks;
    $("uniqueIds").textContent = seenIds.size;
  };
  ws.onerror = () => { $("trackStatus").textContent = "ws error"; };
};

function drawLoop() {
  if (!intrinsicW) syncCanvas();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (latestUpdate) {
    for (const t of latestUpdate.tracks) {
      const c = PALETTE[t.track_id % PALETTE.length];
      ctx.lineWidth = 3; ctx.strokeStyle = c;
      ctx.strokeRect(t.x1, t.y1, t.x2 - t.x1, t.y2 - t.y1);
      // ID label
      ctx.fillStyle = c;
      ctx.fillRect(t.x1, t.y1 - 22, 56, 22);
      ctx.fillStyle = "#fff"; ctx.font = "bold 14px system-ui";
      ctx.fillText(`ID ${t.track_id}`, t.x1 + 6, t.y1 - 6);
    }
  }
  if (!video.paused && !video.ended) requestAnimationFrame(drawLoop);
}
</script>
</body>
</html>
