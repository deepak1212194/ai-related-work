name: Generate contribution snake

# Builds an animated SVG of the GitHub contribution graph as a snake
# eating the contribution squares. The output SVG is committed back to
# the `output` branch and embedded from there in the README.

on:
  schedule:
    - cron: "0 0 * * *"          # daily at 00:00 UTC
  workflow_dispatch:             # allow manual runs from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: deepak1212194
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
