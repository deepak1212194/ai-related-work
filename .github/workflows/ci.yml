name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests (where present)
        run: |
          for proj in 01-rag-faq-bot 02-multi-agent-research-crew 03-sbert-pair-trainer; do
            if [ -d "$proj/tests" ]; then
              echo "[CI] Running tests in $proj"
              (cd "$proj" && pytest -q --no-header || true)
            fi
          done
