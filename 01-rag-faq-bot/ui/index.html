<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG FAQ Bot · Chat</title>
  <style>
    :root {
      --bg: #0d1117; --bg-elev: #161b22; --bg-soft: #1f2530;
      --text: #e6edf3; --muted: #8b949e; --accent: #6ea8fe;
      --accent-soft: rgba(110,168,254,.16); --border: #30363d;
      --ok: #34d399; --warn: #fbbf24; --err: #f87171;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #fafbff; --bg-elev: #fff; --bg-soft: #f0f3fa;
        --text: #1a1d29; --muted: #6b7280; --accent: #4f8cff;
        --accent-soft: rgba(79,140,255,.12); --border: #e3e6ee;
      }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; align-items: center;
      padding: 24px;
    }
    header {
      width: 100%; max-width: 760px;
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 14px; border-bottom: 1px solid var(--border);
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 8px var(--ok); }
    .dot.degraded { background: var(--warn); box-shadow: 0 0 8px var(--warn); }
    h1 { font-size: 1rem; font-weight: 600; margin: 0; }
    .meta { color: var(--muted); font-size: .82rem; }
    .actions button {
      background: var(--bg-soft); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 12px; font-size: .82rem; cursor: pointer;
    }
    .actions button:hover { border-color: var(--accent); }
    main {
      width: 100%; max-width: 760px; flex: 1;
      display: flex; flex-direction: column;
      padding: 18px 0;
    }
    .messages {
      flex: 1; overflow-y: auto; min-height: 320px;
      display: flex; flex-direction: column; gap: 14px;
      padding-right: 4px;
    }
    .msg { display: flex; gap: 10px; }
    .msg .avatar {
      flex: 0 0 auto; width: 30px; height: 30px;
      border-radius: 50%; display: grid; place-items: center;
      font-size: .82rem; font-weight: 700;
    }
    .msg.user .avatar  { background: var(--accent); color: #fff; }
    .msg.bot  .avatar  { background: var(--bg-soft); color: var(--accent); border: 1px solid var(--border); }
    .bubble {
      flex: 1; background: var(--bg-elev); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 14px; line-height: 1.5;
    }
    .bubble.user { background: var(--accent-soft); border-color: var(--accent); }
    .bubble.refused { border-color: var(--warn); }
    .bubble .body { white-space: pre-wrap; }
    .citations { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
    .citation {
      font-size: .82rem; color: var(--muted); padding: 4px 0;
      display: flex; gap: 6px;
    }
    .citation .score {
      flex: 0 0 auto; padding: 1px 6px; border-radius: 4px;
      background: var(--bg-soft); color: var(--text); font-weight: 600;
    }
    .stats { font-size: .76rem; color: var(--muted); margin-top: 6px; }
    form {
      display: flex; gap: 8px; padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    input[type=text] {
      flex: 1; padding: 12px 14px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg-elev);
      color: var(--text); font-size: .95rem; outline: none;
    }
    input[type=text]:focus { border-color: var(--accent); }
    button.send {
      padding: 0 18px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff;
      font-weight: 600; cursor: pointer;
    }
    button.send:disabled { opacity: .5; cursor: not-allowed; }
    .empty {
      color: var(--muted); text-align: center; padding: 60px 0; font-size: .92rem;
    }
    .empty .hint { margin-top: 6px; font-size: .8rem; }
    .typing { color: var(--muted); font-style: italic; padding: 6px 0; }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="dot" id="statusDot"></span>
      <h1>RAG FAQ Bot</h1>
      <span class="meta" id="statusMeta">connecting…</span>
    </div>
    <div class="actions">
      <button id="reindexBtn" title="Re-build the FAISS index from the data folder">↻ Re-index</button>
    </div>
  </header>

  <main>
    <div class="messages" id="messages">
      <div class="empty" id="empty">
        Ask me anything about RAG, FAISS, or sentence transformers.
        <div class="hint">Tip: try “What is hallucination mitigation in RAG?”</div>
      </div>
    </div>

    <form id="chatForm" autocomplete="off">
      <input type="text" id="q" placeholder="Type your question…" required maxlength="1000" />
      <button class="send" type="submit" id="sendBtn">Send</button>
    </form>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const messages = $("messages");
    const empty = $("empty");
    const statusDot = $("statusDot");
    const statusMeta = $("statusMeta");

    async function refreshHealth() {
      try {
        const r = await fetch("/health").then(x => x.json());
        statusDot.classList.toggle("degraded", r.status !== "ok");
        statusMeta.textContent = `${r.embed_model.split("/").pop()} · ${r.chunks_indexed} chunks`;
      } catch { statusMeta.textContent = "offline"; statusDot.classList.add("degraded"); }
    }
    refreshHealth();

    $("reindexBtn").onclick = async () => {
      const btn = $("reindexBtn");
      btn.disabled = true; btn.textContent = "indexing…";
      try {
        const r = await fetch("/api/ingest", { method: "POST" }).then(x => x.json());
        addBot(`Re-indexed: ${r.chunks_indexed} chunks (${r.elapsed_ms} ms)`, []);
      } catch (e) { addBot(`Re-index failed: ${e}`, []); }
      btn.disabled = false; btn.textContent = "↻ Re-index";
      refreshHealth();
    };

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({
        "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;", "'":"&#39;"
      }[c]));
    }

    function addUser(text) {
      empty?.remove();
      messages.insertAdjacentHTML("beforeend", `
        <div class="msg user">
          <div class="avatar">D</div>
          <div class="bubble user"><div class="body">${escapeHtml(text)}</div></div>
        </div>`);
      messages.scrollTop = messages.scrollHeight;
    }

    function addBot(answer, citations, status, ms) {
      empty?.remove();
      const ctsHtml = (citations || []).map(c =>
        `<div class="citation"><span class="score">${c.score.toFixed(2)}</span><span>${escapeHtml(c.snippet)}</span></div>`
      ).join("");
      const refusedClass = status === "refused" ? " refused" : "";
      messages.insertAdjacentHTML("beforeend", `
        <div class="msg bot">
          <div class="avatar">🤖</div>
          <div class="bubble bot${refusedClass}">
            <div class="body">${escapeHtml(answer)}</div>
            ${ctsHtml ? `<div class="citations">${ctsHtml}</div>` : ""}
            ${ms != null ? `<div class="stats">${status} · ${ms} ms</div>` : ""}
          </div>
        </div>`);
      messages.scrollTop = messages.scrollHeight;
    }

    function addTyping() {
      messages.insertAdjacentHTML("beforeend",
        `<div class="msg bot" id="typing"><div class="avatar">🤖</div><div class="typing">thinking…</div></div>`);
      messages.scrollTop = messages.scrollHeight;
    }
    function removeTyping() { document.getElementById("typing")?.remove(); }

    $("chatForm").onsubmit = async (e) => {
      e.preventDefault();
      const q = $("q").value.trim();
      if (!q) return;
      addUser(q); $("q").value = "";
      $("sendBtn").disabled = true;
      addTyping();
      try {
        const r = await fetch("/api/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: q }),
        }).then(x => x.json());
        removeTyping();
        addBot(r.answer, r.citations, r.status, r.elapsed_ms);
      } catch (err) {
        removeTyping();
        addBot(`Error: ${err.message || err}`, []);
      }
      $("sendBtn").disabled = false;
      $("q").focus();
    };
  </script>
</body>
</html>
